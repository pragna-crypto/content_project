<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Authenticity Detector</title>
    <!-- Use Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    
    {% if user.is_authenticated %}
    <aside class="sidebar glass-panel">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Detector
        </div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="{% url 'dashboard' %}" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Dashboard</a></li>
                <li><a href="{% url 'history' %}" class="nav-link {% if 'history' in request.path %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Scan Vault</a></li>
            </ul>
        </nav>
        
        <div class="user-info">
            <span style="color:var(--text-secondary); font-size:0.875rem;">Logged in as:</span>
            <span style="font-weight:600;">@{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="margin-top:0.5rem">
                {% csrf_token %}
                <button type="submit" class="nav-link" style="background:transparent; border:none; padding:0; cursor:pointer;" onclick="return confirm('Logout?')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </form>
        </div>
    </aside>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Scripts -->
    <script src="{% static 'js/app.js' %}"></script>
    
    {% else %}
        {% block auth_content %}{% endblock %}
    {% endif %}

</body>
</html>
