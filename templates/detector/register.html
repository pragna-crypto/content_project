{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-container">
    <div class="glass-panel auth-form neon-border">
        <h2 style="text-align:center; color:var(--accent-neon); margin-bottom:0.5rem">Create Account</h2>
        <p style="text-align:center; color:var(--text-secondary); margin-bottom:2rem; font-size:0.875rem">Join the Authenticity network</p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom:1rem">
                    <label style="display:block; margin-bottom:0.5rem; font-size:0.875rem; color:var(--text-secondary)">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color:var(--color-red); font-size:0.75rem; margin-top:0.25rem">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn-neon" style="width:100%; margin-top:1rem">Register</button>
        </form>
        
        <div style="text-align:center; margin-top:1.5rem; font-size:0.875rem">
            <span style="color:var(--text-secondary)">Already have an account?</span>
            <a href="{% url 'login' %}" style="color:var(--accent-neon); text-decoration:none">Sign In</a>
        </div>
    </div>
</div>
<script>
    // Style form fields
    document.querySelectorAll('input').forEach(input => {
        if(input.type !== 'hidden') input.classList.add('input-field');
    });
</script>
{% endblock %}
